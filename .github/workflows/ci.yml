            if [[ "$ASSET" == *.exe ]]; then
              cp "$PNPM_BIN" "$PNPM_DIR/pnpm.exe"
            else
              ln -sf "$PNPM_BIN" "$PNPM_DIR/pnpm"
            fi
          fi
