          node-version: ${{ matrix.node-version }}

      - name: Build CLI
        working-directory: packages/cli
        shell: bash
        run: |
          pnpm run build

      - name: Run e2e tests (shard ${{ matrix.shard }})
        working-directory: packages/cli
        shell: bash
        env:
          SOCKET_CLI_API_TOKEN: ${{ secrets.SOCKET_CLI_API_TOKEN }}
          SHARD: ${{ matrix.shard }}
        run: |
          pnpm run e2e-tests --shard="$SHARD"/2
