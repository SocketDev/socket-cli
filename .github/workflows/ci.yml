# <fleet-canonical>
# Managed by socket-wheelhouse. Don't edit this block locally — edit
# template/base/.github/workflows/ci.yml upstream and re-cascade via
# `pnpm run sync`. Fleet CI runs check + test using the LOCAL composite actions
# under .github/actions/ (inlined — no cross-repo reusable, no `uses:@sha` for
# first-party). Repo-owned jobs go BELOW the END marker (still under the
# top-level `jobs:` key). See scripts/repo/sync-scaffolding/checks/workflow-fleet-block.mts.
name: ⚡ CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Fleet no-phone-home posture: CI runners don't source the shell-rc that dev
# machines get from setup-security-tools, so set every FLEET_ENV knob
# workflow-level or the telemetry-env-is-disabled +
# package-manager-auto-update-is-disabled gates (under `check --all`) fail.
# Lockstep source: .claude/hooks/fleet/_shared/fleet-env.mts (FLEET_ENV) —
# the telemetry-env-is-disabled check asserts each knob at CI runtime.
env:
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
  COREPACK_ENABLE_PROJECT_SPEC: '0'
  DISABLE_TELEMETRY: '1'
  DO_NOT_TRACK: '1'
  NO_UPDATE_NOTIFIER: '1'

jobs:
  # First step of every job is the third-party actions/checkout (GitHub fetches
  # it independently) to populate the workspace so the LOCAL `./.github/actions/*`
  # composites resolve. setup-and-install then re-checks-out at its deeper
  # default (fetch-depth 25 — covers CI's git operations) and
  # runs the zizmor Actions audit (its own `strategy.job-total < 2` skip runs it
  # in the non-matrix check job, skips it in the test matrix).
  check:
    name: 🔎 Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-15)
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: ./.github/actions/fleet/setup-and-install
        with:
          socket-api-token: ${{ secrets.SOCKET_API_TOKEN_FOR_CLI_AND_SFW }}
      - uses: ./.github/actions/fleet/run-script
        with:
          main-script: pnpm run check --all

  test:
    name: 🧪 Test
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        # JS/TS tests only need a fast Linux run; cross-platform behavior is
        # covered by unit tests, not the CI matrix.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-15)
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: ./.github/actions/fleet/setup-and-install
        with:
          socket-api-token: ${{ secrets.SOCKET_API_TOKEN_FOR_CLI_AND_SFW }}
      - uses: ./.github/actions/fleet/run-script
        env:
          # Authenticate build-time GitHub API reads (release listings,
          # prebuilt-artifact downloads). Unauthenticated calls share the
          # hosted runner's IP-scoped rate limit and 403 under load.
          GH_TOKEN: ${{ github.token }}
        with:
          setup-script: pnpm run build
          main-script: pnpm test --all
  # </fleet-canonical>

  # Repo-owned. WHY: socket-cli's dependency closure is ~950 packages and a
  # COLD `pnpm install` through the sfw shims runs ~9 minutes, which starves
  # the fleet check job's 10-minute budget (and leaves the test job's 15
  # minutes too tight for build + suite). The fleet cache-pnpm-store
  # composite RESTORES fine but its save never runs: actions/cache's post
  # step re-evaluates `path: steps.store.outputs.path` outside the
  # composite's steps context and bails with "Input required and not
  # supplied: path" (observed in run 30097714390), so no job in this repo
  # ever seeds the store cache and every run stays cold. Until the
  # wheelhouse composite saves the store itself, this job installs and then
  # saves the store EXPLICITLY at job level — same key shape the
  # composite's restore looks up — so check/test restore warm on subsequent
  # runs. Delete this job when the fleet cache-pnpm-store composite's save
  # is fixed upstream.
  warm-pnpm-store:
    name: 🔥 Warm pnpm store cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-15)
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: ./.github/actions/fleet/setup-and-install
        with:
          socket-api-token: ${{ secrets.SOCKET_API_TOKEN_FOR_CLI_AND_SFW }}
      - name: Resolve pnpm store path and Node major for the cache key
        id: store
        run: |
          echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"
          echo "node-major=$(node -p 'process.versions.node.split(".")[0]')" >> "$GITHUB_OUTPUT"
      # Key mirrors .github/actions/fleet/cache-pnpm-store exactly
      # (prefix `pnpm-store`, cache-version `v1`, runner OS, Node major,
      # lockfile hash) so the fleet composite's restore step in check/test
      # gets an exact hit. Saving an already-existing key is a no-op warning.
      - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 (2026-06-26)
        with:
          path: ${{ steps.store.outputs.path }}
          key: pnpm-store-v1-${{ runner.os }}-node${{ steps.store.outputs.node-major }}-${{ hashFiles('**/pnpm-lock.yaml') }}
