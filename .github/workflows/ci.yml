name: 🚀 CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches: [main]
    tags: ['*']
    paths:
      - 'packages/cli/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild (ignore cache)'
        type: boolean
        default: false
      node-versions:
        description: 'Node.js versions to test (JSON array)'
        required: false
        type: string
        # Default should match .node-version file.
        default: '["25"]'

permissions: {}


jobs:
  versions:
    name: Load Tool Versions
    runs-on: ubuntu-latest
    permissions:
      contents: read # Read .node-version file from repository.
    outputs:
      node: ${{ steps.versions.outputs.node }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Load Node.js version from .node-version
        id: versions
        shell: bash
        run: |
          NODE_VERSION=$(cat .node-version)
          echo "node=[\"$NODE_VERSION\"]" >> $GITHUB_OUTPUT
          echo "Loaded Node.js: $NODE_VERSION"

  # Lint and type check jobs (run in parallel).
  lint:
    name: 🧹 Lint Check
    needs: versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@ea1986b8019fedee5fb38b485690b13ad8e0217f # main
        with:
          checkout: 'false'

      - name: Run lint
        shell: bash
        run: |
          pnpm --filter @socketsecurity/cli run check

  type-check:
    name: 🔍 Type Check
    needs: versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@ea1986b8019fedee5fb38b485690b13ad8e0217f # main
        with:
          checkout: 'false'

      - name: Run type check
        shell: bash
        run: |
          pnpm --filter @socketsecurity/cli run type

  # Sharded unit tests for faster CI.
  test-sharded:
    name: Unit Tests (Shard ${{ matrix.shard }}/3)
    needs: [lint, type-check, versions]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions || needs.versions.outputs.node) }}
        shard: [1, 2, 3]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@ea1986b8019fedee5fb38b485690b13ad8e0217f # main
        with:
          checkout: 'false'
          node-version: ${{ matrix.node-version }}

      - name: Build CLI
        working-directory: packages/cli
        shell: bash
        env:
          # download-assets.mts hits the GitHub releases API for
          # binject / node-smol / iocraft. Anonymous calls share the
          # 60-req/hr public quota and get 403 once exhausted; the
          # auto-provided GITHUB_TOKEN gives this job its own 1000/hr
          # bucket.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run build

      - name: Run unit tests (shard ${{ matrix.shard }})
        working-directory: packages/cli
        shell: bash
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          pnpm test:unit --shard="$SHARD"/3

  # E2E tests
  e2e:
    name: E2E Tests (Shard ${{ matrix.shard }}/2)
    needs: [lint, type-check, versions]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions || needs.versions.outputs.node) }}
        shard: [1, 2]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@ea1986b8019fedee5fb38b485690b13ad8e0217f # main
        with:
          checkout: 'false'
          node-version: ${{ matrix.node-version }}

      - name: Build CLI
        working-directory: packages/cli
        shell: bash
        env:
          # download-assets.mts hits the GitHub releases API for
          # binject / node-smol / iocraft. Anonymous calls share the
          # 60-req/hr public quota and get 403 once exhausted; the
          # auto-provided GITHUB_TOKEN gives this job its own 1000/hr
          # bucket.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run build

      - name: Run e2e tests (shard ${{ matrix.shard }})
        working-directory: packages/cli
        shell: bash
        env:
          SOCKET_CLI_API_TOKEN: ${{ secrets.SOCKET_CLI_API_TOKEN }}
          SHARD: ${{ matrix.shard }}
        run: |
          pnpm run e2e-tests --shard="$SHARD"/2
